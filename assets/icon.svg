<svg width="256" height="256" viewBox="0 0 256 256" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="gradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#4F46E5;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#7C3AED;stop-opacity:1" />
    </linearGradient>
    <radialGradient id="glow" cx="50%" cy="50%" r="50%" fx="50%" fy="50%">
      <stop offset="0%" style="stop-color:white;stop-opacity:0.3" />
      <stop offset="100%" style="stop-color:white;stop-opacity:0" />
    </radialGradient>
  </defs>
  
  <!-- Fondo circular -->
  <circle cx="128" cy="128" r="112" fill="url(#gradient)" stroke="#3730A3" stroke-width="4"/>
  
  <!-- Glow interno -->
  <circle cx="128" cy="128" r="108" fill="url(#glow)"/>
  
  <!-- Símbolo de red mesh -->
  <g fill="white" stroke="white" stroke-width="2">
    <!-- Nodo central -->
    <circle cx="128" cy="128" r="16" fill="white" opacity="0.9"/>
    
    <!-- Nodos periféricos -->
    <circle cx="80" cy="80" r="10" fill="white" opacity="0.8"/>
    <circle cx="176" cy="80" r="10" fill="white" opacity="0.8"/>
    <circle cx="80" cy="176" r="10" fill="white" opacity="0.8"/>
    <circle cx="176" cy="176" r="10" fill="white" opacity="0.8"/>
    
    <!-- Conexiones -->
    <path d="M128,128 L80,80" stroke="white" stroke-width="3" opacity="0.6"/>
    <path d="M128,128 L176,80" stroke="white" stroke-width="3" opacity="0.6"/>
    <path d="M128,128 L80,176" stroke="white" stroke-width="3" opacity="0.6"/>
    <path d="M128,128 L176,176" stroke="white" stroke-width="3" opacity="0.6"/>
    
    <!-- Conexiones entre periféricos -->
    <path d="M80,80 L176,80" stroke="white" stroke-width="2" opacity="0.4" stroke-dasharray="4,4"/>
    <path d="M80,176 L176,176" stroke="white" stroke-width="2" opacity="0.4" stroke-dasharray="4,4"/>
    <path d="M80,80 L80,176" stroke="white" stroke-width="2" opacity="0.4" stroke-dasharray="4,4"/>
    <path d="M176,80 L176,176" stroke="white" stroke-width="2" opacity="0.4" stroke-dasharray="4,4"/>
  </g>
  
  <!-- Aro exterior decorativo -->
  <circle cx="128" cy="128" r="120" fill="none" stroke="white" stroke-width="2" opacity="0.2"/>
</svg>