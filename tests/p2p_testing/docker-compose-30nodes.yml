version: '3.8'

services:
  # Bootstrap node (node1)
  node1:
    build:
      context: .
      dockerfile: tests/p2p_testing/Dockerfile.peer
    container_name: upeer_node_1
    cap_add:
      - NET_ADMIN
    devices:
      - /dev/net/tun
    volumes:
      - p2p_shared_data:/shared
    environment:
      - NODE_ENV_NAME=node1
    networks:
      upeer_network:
        ipv6_address: fd00:1::1
    restart: unless-stopped

  # Layer 1: Nodes 2-6 connect to node1
