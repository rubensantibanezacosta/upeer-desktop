version: "3.8"

# 2 peers de prueba que se conectan a tu nodo y responden con ACKs automáticos
# Uso: docker compose -f docker-compose-2peers.yml up --build
#
# Target: a64a5ea070f3066f96d71af21101837f@200:7704:49e5:b4cd:7910:2191:2574:351b

services:
  peer-alice:
    build:
      context: .
      dockerfile: Dockerfile.peer
    container_name: peer-alice
    privileged: true
    cap_add:
      - NET_ADMIN
    devices:
      - /dev/net/tun:/dev/net/tun
    environment:
      - TARGET_IDENTITY=a64a5ea070f3066f96d71af21101837f@200:7704:49e5:b4cd:7910:2191:2574:351b
      - BOT_ALIAS=Alice_Bot
      - BOT_COLOR=#4f72d9
      - PYTHONUNBUFFERED=1
    volumes:
      - shared_data_2peers:/shared
    restart: unless-stopped
    networks:
      - botnet

  peer-carlos:
    build:
      context: .
      dockerfile: Dockerfile.peer
    container_name: peer-carlos
    privileged: true
    cap_add:
      - NET_ADMIN
    devices:
      - /dev/net/tun:/dev/net/tun
    environment:
      - TARGET_IDENTITY=a64a5ea070f3066f96d71af21101837f@200:7704:49e5:b4cd:7910:2191:2574:351b
      - BOT_ALIAS=Carlos_Bot
      - BOT_COLOR=#2a8c4a
      - PYTHONUNBUFFERED=1
    volumes:
      - shared_data_2peers:/shared
    restart: unless-stopped
    networks:
      - botnet

volumes:
  shared_data_2peers:

networks:
  botnet:
    driver: bridge
